<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi! I'm Hthune</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cấu hình Tailwind cho Dark mode và Màu sắc -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        black: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#210b43', /* Màu nền tím đậm của Dark Mode */
                        darkCard: '#1a0836', /* Màu nền thẻ của Dark Mode */
                    }
                }
            }
        }
    </script>
    <!-- Import Font Poppins giống trong ảnh -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Tiêu đề chính siêu đậm */
        .title-hthune {
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* --- XỬ LÝ HIỆU ỨNG THẺ (CARD) VÀ NHÂN VẬT --- */
        .light-border {
            border: 6px solid black;
            transition: border-color 2s ease-in-out, background-color 2s ease-in-out !important;
        }
        .dark .light-border {
            border-color: transparent;
        }

        /* Hiệu ứng phát sáng cho nhân vật ở Dark mode (Chuyển dần dần trong 2s) */
        .character-glow {
            filter: drop-shadow(0 0 0px rgba(0, 0, 0, 0));
            transition: filter 2s ease-in-out;
        }
        .dark .character-glow {
            filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 10px rgba(255, 0, 127, 0.3));
        }

        /* Nút Toggle: Nảy lên nhanh nhưng đổi màu chậm */
        #theme-toggle {
            transition: background-color 2s ease-in-out, border-color 2s ease-in-out, box-shadow 2s ease-in-out, transform 0.3s ease !important;
        }
        .dark #theme-toggle {
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .popup-content {
            box-shadow: 0 0 0px rgba(0,0,0,0);
            transition: all 0.3s ease, box-shadow 2s ease-in-out;
        }
        .dark .popup-content {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6), 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* --- CSS CHO POPUP OVERLAY --- */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 40;
        }
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -40%) scale(0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 50;
        }
        .popup-content.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        /* Hiệu ứng hover cho icon */
        .grid-item {
            transition: transform 0.2s ease;
        }
        .grid-item:hover {
            transform: translateY(-5px);
        }

        /* =========================================
           BACKGROUND LAYER & ANIMATION (BIỂN / VŨ TRỤ)
           ========================================= */
        :root {
            --bubble-speed: 6s;
            --theme-blend: 0; /* 0..1 during mode blending */
        }
        #theme-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            transition: opacity 1s ease;
        }

        /* ----- OCEAN MODE (Falling Droplets) ----- */
        .bg-ocean {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, #e0f7fa, #ffffff);
            opacity: 1; transition: opacity 0.5s ease;
        }
        .bubble {
            position: absolute; top: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0%, rgba(210,240,255,0.45) 38%, rgba(160,210,255,0.10) 70%, rgba(255,255,255,0.02) 100%);
            border-radius: 50%; border: 1px solid rgba(180,220,255,0.55);
            box-shadow: 0 4px 10px rgba(0, 28, 85, 0.1);
            animation: fallDown var(--bubble-speed) infinite linear;
        }
        .bubble:nth-child(1) { left: 10%; width: 20px; height: 20px; animation-duration: 5s; animation-delay: 0s; }
        .bubble:nth-child(2) { left: 25%; width: 35px; height: 35px; animation-duration: 7s; animation-delay: 2s; }
        .bubble:nth-child(3) { left: 45%; width: 15px; height: 15px; animation-duration: 4s; animation-delay: 1s; }
        .bubble:nth-child(4) { left: 70%; width: 25px; height: 25px; animation-duration: 6s; animation-delay: 3s; }
        .bubble:nth-child(5) { left: 85%; width: 30px; height: 30px; animation-duration: 5.5s; animation-delay: 0.5s; }

        @keyframes fallDown {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* ----- STAR MODE BACKGROUND (Galaxy + Constellations) ----- */
        .bg-star {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, #081235 0%, #02040a 75%, #000 100%);
            opacity: 0; transition: opacity 1s ease; overflow: hidden;
        }
        .bg-star::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.06; mix-blend-mode: overlay; pointer-events: none; z-index: 1;
        }
        .galactic-disk {
            position: absolute; top: 50%; left: 50%; width: 250%; height: 25%;
            background: linear-gradient(90deg, transparent 0%, rgba(100, 160, 255, 0.08) 20%, rgba(220, 120, 255, 0.10) 50%, rgba(100, 160, 255, 0.08) 80%, transparent 100%);
            transform: translate(-50%, -50%) rotate(-35deg); filter: blur(80px); mix-blend-mode: screen; z-index: 0; pointer-events: none;
        }
        .nebula-container {
            position: absolute; inset: -50%; width: 200%; height: 200%;
            pointer-events: none; z-index: 0; filter: blur(120px); opacity: 0.25; animation: drift 180s linear infinite;
        }
        .nebula { position: absolute; border-radius: 50%; mix-blend-mode: screen; }
        .nebula-1 { top: 15%; left: 25%; width: 50%; height: 40%; background: radial-gradient(circle, #4b0082 0%, transparent 70%); }
        .nebula-2 { top: 55%; left: 15%; width: 60%; height: 50%; background: radial-gradient(circle, #1a0033 0%, transparent 60%); }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .shooting-star-v2 {
            position: absolute; top: 0; left: 0; width: 1px; height: 1px; background: #fff;
            transform: rotate(45deg); pointer-events: none; z-index: 20; opacity: 0;
        }
        .shooting-star-v2::before {
            content: ""; position: absolute; top: 0; right: 0; width: 180px; height: 1.2px;
            background: linear-gradient(to left, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0)); filter: drop-shadow(0 0 4px #fff);
        }
        @keyframes shooting-animation {
            0% { transform: translate(-200px, -200px) rotate(45deg); opacity: 0; }
            1% { opacity: 1; }
            20% { transform: translate(1200px, 1200px) rotate(45deg); opacity: 0; }
            100% { transform: translate(1200px, 1200px) rotate(45deg); opacity: 0; }
        }
        .ss-1 { top: 10%; left: 5%;  animation: shooting-animation 15s infinite; animation-delay: 2s; }
        .ss-2 { top: -15%; left: 20%; animation: shooting-animation 22s infinite; animation-delay: 8s; }
        .ss-3 { top: 30%; left: -10%; animation: shooting-animation 18s infinite; animation-delay: 14s; }

        .constellation { position: absolute; pointer-events: none; z-index: 10; opacity: 0.95; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7)); }
        .c-line { stroke: rgba(255, 255, 255, 0.5); stroke-width: 1.0; fill: none; }
        .c-star { fill: #ffffff; opacity: 1; filter: drop-shadow(0 0 4px #fff); }
        .c-main-star { fill: #ffffff; filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px rgba(100, 200, 255, 1)); transform-box: fill-box; transform-origin: center; animation: pulse-star 3s infinite alternate; }
        @keyframes pulse-star { 0% { opacity: 0.7; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.3); } }

        .aries { top: 10%; left: 10%; width: 90px; } .taurus { top: 7%; left: 35%; width: 130px; } .gemini { top: 4%; left: 65%; width: 110px; }
        .cancer { top: 22%; left: 88%; width: 100px; } .leo { top: 52%; left: 88%; width: 140px; } .virgo { top: 50%; left: 50%; width: 230px; transform: translate(-50%, -50%); opacity: 1; }
        .libra { top: 82%; left: 55%; width: 110px; } .scorpio { top: 75%; left: 22%; width: 160px; } .sagittarius { top: 38%; left: 8%; width: 140px; }
        .capricorn { top: 15%; left: 90%; width: 110px; } .aquarius { top: 88%; left: 78%; width: 150px; } .pisces { top: 85%; left: 8%; width: 140px; }

        .stars-layer {
            position: absolute; inset: 0; z-index: 2; opacity: 0.4; pointer-events: none;
            background-image: radial-gradient(0.7px 0.7px at 20% 20%, #fff, transparent), radial-gradient(0.7px 0.7px at 50% 50%, #fff, transparent), radial-gradient(0.7px 0.7px at 80% 80%, #fff, transparent); background-size: 300px 300px;
        }

        /* TRANSITION OVERLAY (NEW BLEND v4) */
        #transition-overlay{
            position: fixed; inset: 0; z-index: 99999; pointer-events: none; overflow: hidden; opacity: 0;
            transition: opacity 800ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        #transition-overlay.active{ opacity: 1; pointer-events: auto; }

        .meteor-wrap{ position: absolute; inset: 0; overflow: hidden; }
        #meteorCanvas{ position: absolute; inset: 0; width: 100%; height: 100%; display: block; pointer-events: none; }

        .meteor{
            position: absolute; left: 0; top: 0; width: var(--tail, 420px); height: var(--tail-thick, 3px);
            border-radius: 999px; opacity: 0; will-change: transform, opacity; transform-origin: 0 50%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255, 210, 230, 0.92) 22%, rgba(255, 250, 205, 0.88) 46%, rgba(210, 250, 255, 0.84) 70%, rgba(235, 210, 255, 0.86) 94%, rgba(255,255,255,0.98) 100%);
            filter: drop-shadow(0 0 14px rgba(255,255,255,0.62)); animation: meteorFly var(--meteor-dur, 900ms) linear forwards;
        }
        @keyframes meteorFly{
            0%   { opacity: 0; transform: translate3d(var(--sx), var(--sy), 0) rotate(135deg); }
            15%  { opacity: 1; }
            85%  { opacity: 1; }
            100% { opacity: 0; transform: translate3d(var(--dx), var(--dy), 0) rotate(135deg); }
        }

        html.dark .bg-ocean { opacity: 0; }
        html.dark .bg-star { opacity: 1; }

        body.theme-blending.blend-to-star .bg-star{ opacity: var(--theme-blend); transition: none !important; }
        body.theme-blending.blend-to-star .bg-ocean{ opacity: calc(1 - var(--theme-blend)); transition: none !important; }
        body.theme-blending.blend-to-ocean .bg-ocean{ opacity: var(--theme-blend); transition: none !important; }
        body.theme-blending.blend-to-ocean .bg-star{ opacity: calc(1 - var(--theme-blend)); transition: none !important; }
    </style>
</head>

    <!-- JAVASCRIPT XỬ LÝ (TÍCH HỢP HIỆU ỨNG TỪ MAIN.HTML) -->
    <script>
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const overlay = document.getElementById('transition-overlay');
        const meteorWrap = document.getElementById('meteorWrap');
        const meteorCanvas = document.getElementById('meteorCanvas');

        let meteorRAF = 0;
        let transitionBusy = false;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        function clearMeteors(){
            if (meteorRAF) { cancelAnimationFrame(meteorRAF); meteorRAF = 0; }
            if (meteorWrap) meteorWrap.innerHTML = '';
            if (meteorCanvas) {
                const ctx = meteorCanvas.getContext('2d');
                if (ctx) {
                    ctx.setTransform(1,0,0,1,0,0);
                    ctx.clearRect(0, 0, meteorCanvas.width, meteorCanvas.height);
                }
            }
        }

        function spawnBubbles(count, durationMs){
            clearMeteors();
            const ctx = meteorCanvas.getContext("2d");
            if (!ctx) return;

            const w = window.innerWidth, h = window.innerHeight;
            const dpr = Math.min(2, window.devicePixelRatio || 1);
            meteorCanvas.width  = Math.floor(w * dpr);
            meteorCanvas.height = Math.floor(h * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const bubbles = Array.from({length: count}, () => ({
                x: Math.random() * w, y: -50 - Math.random() * h,
                r: 5 + Math.random() * 25, vy: 200 + Math.random() * 400,
                opacity: 0.4 + Math.random() * 0.4
            }));

            const t0 = performance.now();
            let last = t0;

            function frame(now){
                const elapsed = now - t0;
                const dt = Math.min(0.05, (now - last) / 1000);
                last = now;
                ctx.clearRect(0, 0, w, h);

                for (const b of bubbles){
                    b.y += b.vy * dt;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    const alpha = b.opacity;
                    const grad = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.2, b.x, b.y, b.r);
                    grad.addColorStop(0, `rgba(255,255,255,${Math.min(0.95, alpha + 0.35)})`);
                    grad.addColorStop(0.35, `rgba(210,240,255,${alpha})`);
                    grad.addColorStop(1, `rgba(160,210,255,0)`);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    if (b.y > h + 60) b.y = -60;
                }

                if (elapsed < durationMs + 1000) {
                    meteorRAF = requestAnimationFrame(frame);
                } else {
                    ctx.clearRect(0, 0, w, h);
                }
            }
            meteorRAF = requestAnimationFrame(frame);
        }

        function spawnMeteors(count, durationMs){
            clearMeteors();
            const w = window.innerWidth, h = window.innerHeight;
            const diag = Math.hypot(w, h);
            const frag = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const m = document.createElement('div');
                m.className = 'meteor';
                const sx = (Math.random() * w * 1.5) - (w * 0.3);
                const sy = (Math.random() * h * 0.6) - (h * 0.4);
                const travel = diag * (1.1 + Math.random() * 0.5);
                const dx = sx - travel;
                const dy = sy + travel;
                const dur = 800 + Math.random() * 600;
                const delay = durationMs > 0 ? Math.random() * Math.max(0, (durationMs - 400)) : 0;

                m.style.setProperty('--sx', sx + 'px');
                m.style.setProperty('--sy', sy + 'px');
                m.style.setProperty('--dx', dx + 'px');
                m.style.setProperty('--dy', dy + 'px');
                m.style.setProperty('--meteor-dur', dur + 'ms');
                m.style.animationDelay = delay + 'ms';
                frag.appendChild(m);
            }
            meteorWrap.appendChild(frag);
            setTimeout(() => { if (meteorWrap) meteorWrap.innerHTML = ''; }, Math.max(600, durationMs + 450));
        }

        // ==========================================
        // XỬ LÝ SỰ KIỆN CLICK NÚT THEME (ĐÃ CHỈNH SỬA MƯỢT MÀ)
        // ==========================================
        themeToggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (transitionBusy) return;
            transitionBusy = true;

            const goingToDark = !htmlElement.classList.contains('dark');
            const DURATION = 2000;
            const FADE_OUT = 800;

            overlay.style.transition = 'none';
            overlay.style.opacity = '1';
            overlay.classList.add('active');

            // BẬT THEME NGAY LẬP TỨC!
            // Nhờ các thẻ HTML và CSS có transition duration=2000ms, nó sẽ làm đổi màu cực kỳ từ từ khớp theo sao băng
            if (goingToDark) {
                htmlElement.classList.add('dark');
                localStorage.theme = 'dark';
                spawnMeteors(150, DURATION);
            } else {
                htmlElement.classList.remove('dark');
                localStorage.theme = 'light';
                spawnBubbles(80, DURATION);
            }

            // Gắn class chuẩn bị blend nền vũ trụ/đại dương
            const blendClass = goingToDark ? 'blend-to-star' : 'blend-to-ocean';
            document.body.classList.add('theme-blending', blendClass);

            const t0 = performance.now();
            const tick = (now) => {
                const p = Math.min(1, (now - t0) / DURATION);
                document.body.style.setProperty('--theme-blend', String(p));

                if (p < 1) {
                    requestAnimationFrame(tick);
                    return;
                }

                document.body.classList.remove('theme-blending', 'blend-to-star', 'blend-to-ocean');
                document.body.style.removeProperty('--theme-blend');

                overlay.style.transition = `opacity ${FADE_OUT}ms ease`;
                overlay.style.opacity = '0';

                setTimeout(() => {
                    overlay.classList.remove('active');
                    clearMeteors();
                    transitionBusy = false;
                }, FADE_OUT);
            };
            requestAnimationFrame(tick);
        });

        function openPopup(id) {
            const overlay = document.getElementById('overlay');
            const popup = document.getElementById(id);
            if(overlay && popup) {
                overlay.classList.add('active');
                popup.classList.add('active');
            }
        }

        function closeAllPopups() {
            document.getElementById('overlay').classList.remove('active');
            const popups = document.querySelectorAll('.popup-content');
            popups.forEach(popup => {
                popup.classList.remove('active');
            });
        }
    </script>
