<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi! I'm Hthune</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cấu hình Tailwind cho Dark mode và Màu sắc -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        black: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#210b43', /* Màu nền tím đậm của Dark Mode */
                        darkCard: '#1a0836', /* Màu nền thẻ của Dark Mode */
                    }
                }
            }
        }
    </script>
    <!-- Import Font Poppins giống trong ảnh -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Tiêu đề chính siêu đậm */
        .title-hthune {
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* --- XỬ LÝ HIỆU ỨNG DARK MODE --- */
        .dark .card-wrapper {
            background: linear-gradient(135deg, #00f0ff, #ff007f);
            padding: 5px;
            box-shadow: 
                0 0 10px rgba(0, 240, 255, 0.6),
                0 0 20px rgba(255, 0, 127, 0.6),
                0 0 40px rgba(0, 240, 255, 0.4),
                0 0 80px rgba(255, 0, 127, 0.3);
        }
        .light-border {
            border: 6px solid black;
        }
        .dark .light-border {
            border: none;
        }

        /* Hiệu ứng phát sáng cho nhân vật ở Dark mode */
        .dark .character-glow {
            filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 10px rgba(255, 0, 127, 0.3));
        }

        /* Hiệu ứng Neon cho popup và nút bấm ở Dark mode */
        .dark .popup-content {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6), 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .dark #theme-toggle {
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
        }

        /* --- CSS CHO POPUP OVERLAY --- */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 40;
        }
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -40%) scale(0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 50;
        }
        .popup-content.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        /* Hiệu ứng hover cho icon */
        .grid-item {
            transition: transform 0.2s ease;
        }
        .grid-item:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-[#f2f2f2] dark:bg-darkBg text-black dark:text-white min-h-screen flex items-center justify-center p-4 transition-colors duration-500 overflow-x-hidden">

    <!-- Nút Toggle Dark/Light Mode -->
    <button id="theme-toggle" class="fixed top-6 right-6 z-50 p-3 rounded-full bg-white dark:bg-darkCard shadow-lg border-[3px] border-black dark:border-[#00f0ff] hover:scale-110 transition-transform duration-300">
        <svg id="moon-icon" class="w-6 h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        <svg id="sun-icon" class="w-6 h-6 hidden dark:block text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    </button>

    <!-- CONTAINER CHÍNH -->

            left-[900px] sm:left-[100px] md:left-[110px]

            -mb-10 sm:mb-0">

                <img src="https://raw.githubusercontent.com/nguyendangminh278-coder/hthune_2025/4fec4ee8fe546bf85a644719e4df29092e3592fa/Portlio/4%201.png" alt="Light Character Hover" class="h-full w-auto max-w-none absolute bottom-0 left-0 pointer-events-none hidden group-hover:block">
            </div>

            <!-- Chế độ Dark Mode (Đổi ảnh khi Hover) -->

                <img src="https://raw.githubusercontent.com/nguyendangminh278-coder/hthune_2025/4fec4ee8fe546bf85a644719e4df29092e3592fa/Portlio/6%201.png" alt="Dark Character Hover" class="h-full w-auto max-w-none absolute bottom-0 left-0 pointer-events-none hidden group-hover:block">

                    <!-- Icon 4: My skill (Mèo ôm sách) -->

    <!-- 4. LỚP POPUP THEO YÊU CẦU -->
    <div class="popup-overlay" id="overlay" onclick="closeAllPopups()"></div>

    <!-- Ví dụ Popup 1 -->

        <h2 class="text-2xl title-hthune mb-4">About me <3</h2>
        <p class="mb-6 font-medium">Xin chào, đây là phần giới thiệu bản thân. Bạn có thể thay đổi nội dung này trong code html.</p>
        <button onclick="closeAllPopups()" class="w-full bg-black text-white dark:bg-white dark:text-black py-3 rounded-xl font-bold hover:opacity-80 transition-opacity">Đóng lại</button>
    </div>

    <!-- Ví dụ Popup 2 -->
    <div id="popup-2" class="popup-content bg-white dark:bg-darkCard w-[90%] max-w-md p-8 rounded-[1.5rem] border-4 border-black dark:border-[#00f0ff] shadow-2xl">
        <h2 class="text-2xl title-hthune mb-4">Workflow</h2>
        <p class="mb-6 font-medium">Quy trình làm việc của tôi...</p>
        <button onclick="closeAllPopups()" class="w-full bg-black text-white dark:bg-white dark:text-black py-3 rounded-xl font-bold hover:opacity-80 transition-opacity">Đóng lại</button>
    </div>
    
    <!-- Các popup khác bạn có thể copy tương tự popup-1 và đổi id -->

    <!-- JAVASCRIPT XỬ LÝ -->
    <script>
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });

        function openPopup(id) {
            const overlay = document.getElementById('overlay');
            const popup = document.getElementById(id);
            if(overlay && popup) {
                overlay.classList.add('active');
                popup.classList.add('active');
            }
        }

        function closeAllPopups() {
            document.getElementById('overlay').classList.remove('active');
            const popups = document.querySelectorAll('.popup-content');
            popups.forEach(popup => {
                popup.classList.remove('active');
            });
        }
    </script>
</body>
